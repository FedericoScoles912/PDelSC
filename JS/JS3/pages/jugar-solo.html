<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrenSnake - Jugar Solo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/estilos-base.css">
</head>
<body class="bg-dark text-light">
    <div class="container-fluid d-flex flex-column align-items-center pt-4">
        <div class="w-100 d-flex justify-content-between px-4 mb-3">
            <a href="index.html" class="btn btn-outline-secondary">← Volver al Menú</a>
            <div class="text-center">
                <h3 id="nombre-jugador" class="mb-0"></h3>
                <p id="puntaje-actual" class="mb-0">Puntaje: 0</p>
            </div>
            <div class="w-25"></div>
        </div>

        <canvas id="canvas-juego" class="border border-light"></canvas>

        <div id="controles-tactiles" class="d-grid gap-2 mt-3 d-md-none" style="width: 150px;">
            <button id="btn-arriba" class="btn btn-outline-light">↑</button>
            <div class="d-flex gap-2">
                <button id="btn-izquierda" class="btn btn-outline-light flex-grow-1">←</button>
                <button id="btn-abajo" class="btn btn-outline-light flex-grow-1">↓</button>
                <button id="btn-derecha" class="btn btn-outline-light flex-grow-1">→</button>
            </div>
        </div>

        <!-- Modal para Ingresar Nombre -->
        <div class="modal fade" id="modal-nombre" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content bg-dark border border-light">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modal-titulo">Ingresa tu Nombre</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="form-nombre">
                            <div class="mb-3">
                                <label for="input-nombre" class="form-label">Nombre (3 letras max):</label>
                                <input type="text" class="form-control bg-dark text-light" id="input-nombre" maxlength="3" required>
                                <div id="error-nombre" class="text-danger mt-2"></div>
                            </div>
                            <button type="submit" class="btn btn-success">Confirmar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contador 3-2-1 -->
        <div id="contador-inicio" class="d-none position-fixed top-50 start-50 translate-middle">
            <h1 class="display-1 pixel-font" id="numero-contador">3</h1>
        </div>

        <!-- Fin de Partida -->
        <div id="fin-partida" class="d-none text-center position-fixed top-50 start-50 translate-middle">
            <h1 class="display-4 mb-4 pixel-font" id="titulo-fin-partida">Fin de la Partida</h1>
            <p class="fs-3 mb-5" id="resultado-fin-partida"></p>
            <a href="index.html" class="btn btn-outline-light btn-lg">Volver al Menú</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../scripts/jugar-solo.js"></script>
</body>
</html>
