<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrenSnake - Jugador 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/estilos-base.css">
</head>
<body class="bg-dark text-light">
    <div class="container-fluid d-flex flex-column align-items-center pt-4">
        <div class="w-100 d-flex justify-content-between align-items-center px-4 mb-3">
            <a href="index.html" class="btn btn-lg" style="background: linear-gradient(135deg, #666666, #444444); color: white; border: none; border-radius: 10px;">← Menú</a>
            <div class="text-center flex-grow-1">
                <h3 id="nombre-jugador" class="mb-1"></h3>
                <p id="puntaje-actual" class="mb-0 fs-4 fw-bold" style="color: #00cc00;">Puntaje: 0</p>
            </div>
            <div style="width: 80px;"></div>
        </div>

        <canvas id="canvas-juego" class="border border-light"></canvas>

        <div id="controles-tactiles" class="d-grid gap-2 mt-3 d-md-none" style="width: 220px;">
            <button id="btn-arriba" class="btn btn-lg" style="background: linear-gradient(135deg, #00cc00, #009900); color: white; border: none; border-radius: 10px;">↑</button>
            <div class="d-flex gap-2">
                <button id="btn-izquierda" class="btn btn-lg flex-grow-1" style="background: linear-gradient(135deg, #00cc00, #009900); color: white; border: none; border-radius: 10px;">←</button>
                <button id="btn-abajo" class="btn btn-lg flex-grow-1" style="background: linear-gradient(135deg, #00cc00, #009900); color: white; border: none; border-radius: 10px;">↓</button>
                <button id="btn-derecha" class="btn btn-lg flex-grow-1" style="background: linear-gradient(135deg, #00cc00, #009900); color: white; border: none; border-radius: 10px;">→</button>
            </div>
        </div>

        <!-- Contador 3-2-1 -->
        <div id="contador-inicio" class="d-none position-fixed top-50 start-50 translate-middle">
            <h1 class="display-1 pixel-font" id="numero-contador" style="color: #00cc00; text-shadow: 0 0 20px #00cc00;">3</h1>
        </div>

        <!-- Fin de Turno -->
        <div id="fin-partida" class="d-none text-center position-fixed top-50 start-50 translate-middle">
            <h1 class="display-4 mb-4 pixel-font" id="titulo-fin-partida" style="color: #00cc00;">Turno Terminado!</h1>
            <p class="fs-3 mb-5" id="resultado-fin-partida"></p>
            <button id="btn-jugador-2" class="btn btn-lg" style="background: linear-gradient(135deg, #0066ff, #0033aa); color: white; border: none; border-radius: 10px;">Turno del Jugador 2 →</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../scripts/jugador1.js"></script>
</body>
</html>
