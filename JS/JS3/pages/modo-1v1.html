<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrenSnake - Modo 1v1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/estilos-base.css">
</head>
<body class="bg-dark text-light min-vh-100 d-flex flex-column align-items-center justify-content-center">
    <div class="w-75 text-center">
        <h1 class="display-4 mb-5 pixel-font">Modo 1v1</h1>
        
        <div class="mb-4">
            <label for="input-nombre-1" class="form-label fs-5">Jugador 1 - Nombre (máx 3 letras)</label>
            <input type="text" class="form-control text-center bg-dark text-light" id="input-nombre-1" maxlength="3">
        </div>
        
        <div class="mb-4">
            <label for="input-nombre-2" class="form-label fs-5">Jugador 2 - Nombre (máx 3 letras)</label>
            <input type="text" class="form-control text-center bg-dark text-light" id="input-nombre-2" maxlength="3">
        </div>
        
        <button id="btn-empezar" class="btn btn-outline-primary btn-lg mt-3">¡Empezar Partida!</button>
        
        <a href="index.html" class="btn btn-outline-secondary btn-lg mt-3 d-block mx-auto">← Volver al Menú</a>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        console.log('1v1 name entry script loaded');
        
        document.getElementById('btn-empezar').addEventListener('click', () => {
            const nombre1 = document.getElementById('input-nombre-1').value.toUpperCase();
            const nombre2 = document.getElementById('input-nombre-2').value.toUpperCase();
            
            if (nombre1.length === 0 || nombre2.length === 0) {
                alert('Por favor ingrese nombres para ambos jugadores!');
                return;
            }
            
            if (nombre1 === nombre2) {
                alert('Los nombres no pueden ser iguales!');
                return;
            }
            
            // Store names and initial score in localStorage temporarily
            localStorage.setItem('1v1_nombre1', nombre1);
            localStorage.setItem('1v1_nombre2', nombre2);
            localStorage.setItem('1v1_puntaje1', '0');
            
            window.location.href = 'jugador1.html';
        });
    </script>
</body>
</html>
