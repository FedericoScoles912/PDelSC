<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrenSnake - Modo 1v1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/estilos-base.css">
</head>
<body class="bg-dark text-light min-vh-100 d-flex flex-column align-items-center justify-content-center">
    <div class="w-100 text-center px-3">
        <h1 class="display-3 mb-5 pixel-font" style="color: #9900ff; text-shadow: 0 0 20px #9900ff;">⚔️ Modo 1v1</h1>
        
        <div class="row mb-5 align-items-center justify-content-center">
            <div class="col-12 col-md-5 mb-4 mb-md-0">
                <label for="input-nombre-1" class="form-label fs-4 text-success">🐍 Jugador 1</label>
                <input type="text" class="form-control text-center bg-dark text-light border-success" id="input-nombre-1" maxlength="3" placeholder="3 letras">
            </div>
            
            <div class="col-12 col-md-2 my-2">
                <span class="display-3 fw-bold text-warning">VS</span>
            </div>
            
            <div class="col-12 col-md-5">
                <label for="input-nombre-2" class="form-label fs-4 text-primary">🐍 Jugador 2</label>
                <input type="text" class="form-control text-center bg-dark text-light border-primary" id="input-nombre-2" maxlength="3" placeholder="3 letras">
            </div>
        </div>
        
        <div id="error-message" class="alert alert-danger d-none mb-4"></div>
        
        <div class="d-flex gap-3 justify-content-center align-items-center flex-wrap">
            <button id="btn-empezar" class="btn btn-lg" style="background: linear-gradient(135deg, #ff9900, #cc6600); color: white; border: none; border-radius: 10px; box-shadow: 0 4px 12px rgba(255, 153, 0, 0.4);">🎉 ¡Empezar!</button>
            <a href="index.html" class="btn btn-lg" style="background: linear-gradient(135deg, #666666, #444444); color: white; border: none; border-radius: 10px;">← Menú</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        console.log('1v1 name entry script loaded');
        const errorDiv = document.getElementById('error-message');
        
        document.getElementById('btn-empezar').addEventListener('click', () => {
            const nombre1 = document.getElementById('input-nombre-1').value.toUpperCase();
            const nombre2 = document.getElementById('input-nombre-2').value.toUpperCase();
            
            errorDiv.classList.add('d-none');
            
            if (nombre1.length === 0 || nombre2.length === 0) {
                errorDiv.textContent = 'Por favor ingrese nombres para ambos jugadores!';
                errorDiv.classList.remove('d-none');
                return;
            }
            
            if (nombre1 === nombre2) {
                errorDiv.textContent = 'Los nombres no pueden ser iguales!';
                errorDiv.classList.remove('d-none');
                return;
            }
            
            // Store names and initial score in localStorage temporarily
            localStorage.setItem('1v1_nombre1', nombre1);
            localStorage.setItem('1v1_nombre2', nombre2);
            localStorage.setItem('1v1_puntaje1', '0');
            
            window.location.href = 'jugador1.html';
        });
    </script>
</body>
</html>
