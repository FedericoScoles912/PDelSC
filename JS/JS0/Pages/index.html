<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Arrays Master - Interactivo</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../Styles/custom.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <strong>JS Arrays Master</strong>
            </a>
            <span class="navbar-text text-white d-none d-md-inline">
                Control de Servidores y Métodos
            </span>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <div class="col-12 text-center mb-5">
                <h1 class="display-5 fw-bold text-primary">Consola de Métodos de Arrays</h1>
                <p class="lead text-secondary">Haz clic en los botones para ejecutar y mostrar/ocultar los resultados.</p>
                
                <!-- Panel de Botones -->
                <div class="d-flex flex-wrap justify-content-center gap-2 mt-4" id="buttons-panel">
                    <button class="btn btn-outline-primary active-toggle" data-category="pushPop">Push & Pop</button>
                    <button class="btn btn-outline-primary active-toggle" data-category="shiftUnshift">Shift & Unshift</button>
                    <button class="btn btn-outline-primary active-toggle" data-category="spliceSlice">Splice & Slice</button>
                    <button class="btn btn-outline-primary active-toggle" data-category="searchMethods">Búsqueda</button>
                    <button class="btn btn-outline-primary active-toggle" data-category="iterationMethods">Iteración</button>
                    <button class="btn btn-outline-primary active-toggle" data-category="transformMethods">Transformación</button>
                </div>
                <hr class="w-50 mx-auto mt-5 border-secondary">
            </div>
        </div>

        <!-- Contenedor de Resultados -->
        <div id="results-container" class="row g-4 justify-content-center">
            <!-- Los resultados se inyectarán y controlarán desde main.js -->
        </div>
    </main>

    <footer class="footer mt-auto py-3 bg-white border-top text-center">
        <div class="container">
            <span class="text-muted small">© 2026 JS Arrays Master - Modularidad Extrema.</span>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main Script -->
    <script type="module" src="../Scripts/main.js"></script>
</body>
</html>
