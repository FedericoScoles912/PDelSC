<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto POP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; min-height: 100vh; padding: 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .result-box { background: #2d3436; color: #fff; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; }
        .label { font-weight: bold; color: #636e72; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .value { color: #00cec9; }
        .case-container { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .case-container:last-child { border-bottom: none; }
        .error-msg { color: #ff7675; font-size: 0.85rem; margin-top: 5px; font-weight: bold; }
        /* Estilo RTL para Reverse */
        .rtl-result { direction: rtl; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-4">
                    <h2 class="text-center text-success mb-4">.pop() - Refinado</h2>
                    
                    
                    <div class="case-container">
                        <h5 class="mb-3">1. Animales</h5>
                        <div class="row">
                            
                            <div class="col-md-12">
                                <span class="label">Array Inicial:</span>
                                <div class="result-box mb-3"><span class="value">["Perro", "Gato", "Loro"]</span></div>
                            </div>
                            
                            
                            <div class="col-md-12">
                                <button id="btn-1" class="btn btn-sm btn-success mb-3" onclick="ejecutar(1)">Ejecutar Caso 1</button>
                            </div>
                            <div class="col-md-12" id="res-container-1" style="display: none;">
                                <span class="label">Resultado:</span>
                                <div class="result-box "><span class="value" id="final-1"></span></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="case-container">
                        <h5 class="mb-3">2. Lista Compras</h5>
                        <div class="row">
                            
                            <div class="col-md-12">
                                <span class="label">Array Inicial:</span>
                                <div class="result-box mb-3"><span class="value">["Pan", "Leche", "Agua"]</span></div>
                            </div>
                            
                            
                            <div class="col-md-12">
                                <button id="btn-2" class="btn btn-sm btn-success mb-3" onclick="ejecutar(2)">Ejecutar Caso 2</button>
                            </div>
                            <div class="col-md-12" id="res-container-2" style="display: none;">
                                <span class="label">Resultado:</span>
                                <div class="result-box "><span class="value" id="final-2"></span></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="case-container">
                        <h5 class="mb-3">3. Vaciar Array</h5>
                        <div class="row">
                            
                            <div class="col-md-12">
                                <span class="label">Array Inicial:</span>
                                <div class="result-box mb-3"><span class="value">[1, 2, 3]</span></div>
                            </div>
                            
                            
                            <div class="col-md-12">
                                <button id="btn-3" class="btn btn-sm btn-success mb-3" onclick="ejecutar(3)">Ejecutar Caso 3</button>
                            </div>
                            <div class="col-md-12" id="res-container-3" style="display: none;">
                                <span class="label">Resultado:</span>
                                <div class="result-box "><span class="value" id="final-3"></span></div>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
