<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto PUSH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; min-height: 100vh; padding: 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .result-box { background: #2d3436; color: #fff; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; }
        .label { font-weight: bold; color: #636e72; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .value { color: #00cec9; }
        .case-container { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .case-container:last-child { border-bottom: none; }
        .error-msg { color: #ff7675; font-size: 0.85rem; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-4">
                    <h2 class="text-center text-primary mb-4">.push() - Interactividad Avanzada</h2>
                    
                    <!-- Caso 1: Frutas -->
                    <div class="case-container">
                        <h5 class="mb-3">1. Frutas (Ingresa 3 nombres)</h5>
                        <div class="row">
                            <div class="col-md-12">
                                <span class="label">Array Inicial:</span>
                                <div class="result-box mb-3"><span class="value">[]</span></div>
                            </div>
                            <div class="col-md-12 mb-3">
                                <div class="input-group input-group-sm">
                                    <input type="text" id="input-1-1" class="form-control" placeholder="Fruta 1">
                                    <input type="text" id="input-1-2" class="form-control" placeholder="Fruta 2">
                                    <input type="text" id="input-1-3" class="form-control" placeholder="Fruta 3">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <button id="btn-1" class="btn btn-sm btn-primary mb-3" onclick="ejecutar(1)">Agregar Frutas</button>
                            </div>
                            <div class="col-md-12" id="res-container-1" style="display: none;">
                                <span class="label">Resultado:</span>
                                <div class="result-box"><span class="value" id="final-1"></span></div>
                            </div>
                        </div>
                    </div>

                    <!-- Caso 2: Amigos -->
                    <div class="case-container">
                        <h5 class="mb-3">2. Amigos (Agrega 3 más)</h5>
                        <div class="row">
                            <div class="col-md-12">
                                <span class="label">Array Inicial:</span>
                                <div class="result-box mb-3"><span class="value">["Fede", "Gaston"]</span></div>
                            </div>
                            <div class="col-md-12 mb-3">
                                <div class="input-group input-group-sm">
                                    <input type="text" id="input-2-1" class="form-control" placeholder="Amigo 1">
                                    <input type="text" id="input-2-2" class="form-control" placeholder="Amigo 2">
                                    <input type="text" id="input-2-3" class="form-control" placeholder="Amigo 3">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <button id="btn-2" class="btn btn-sm btn-primary mb-3" onclick="ejecutar(2)">Agregar Amigos</button>
                            </div>
                            <div class="col-md-12" id="res-container-2" style="display: none;">
                                <span class="label">Resultado:</span>
                                <div class="result-box"><span class="value" id="final-2"></span></div>
                            </div>
                        </div>
                    </div>

                    <!-- Caso 3: Números -->
                    <div class="case-container">
                        <h5 class="mb-3">3. Números (Mayor al último)</h5>
                        <div class="row">
                            <div class="col-md-12">
                                <span class="label">Array Inicial:</span>
                                <div class="result-box mb-3"><span class="value">[10, 20, 30]</span></div>
                            </div>
                            <div class="col-md-12 mb-3">
                                <input type="number" id="input-3" class="form-control form-control-sm" placeholder="Ingresa un número > 30">
                                <div id="error-3" class="error-msg" style="display: none;">Número no válido. Debe ser mayor al último elemento.</div>
                            </div>
                            <div class="col-md-12">
                                <button id="btn-3" class="btn btn-sm btn-primary mb-3" onclick="ejecutar(3)">Agregar Número</button>
                            </div>
                            <div class="col-md-12" id="res-container-3" style="display: none;">
                                <span class="label">Resultado:</span>
                                <div class="result-box"><span class="value" id="final-3"></span></div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
