<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actividad 4 - API Propia con Node.js</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <h1 class="navbar-brand mb-0">Actividad 4: API Propia con Node.js</h1>
      <button id="themeToggle" class="theme-toggle ms-auto">Modo Oscuro</button>
    </div>
  </header>

  <main class="container">
    <div class="row g-4">
      <div class="col-md-6">
        <div class="card p-4">
          <h2>Obtener Alumnos con Fetch()</h2>
          <button id="fetchBtn" class="btn btn-primary">Cargar Alumnos con Fetch</button>
          <div id="fetchResults" class="results-container mt-3"></div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card p-4">
          <h2>Obtener Alumnos con Axios</h2>
          <button id="axiosBtn" class="btn btn-primary">Cargar Alumnos con Axios</button>
          <div id="axiosResults" class="results-container mt-3"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
