<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actividad 2 - Gestión de Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <h1 class="navbar-brand mb-0">Actividad 2: Gestión de Usuarios</h1>
      <button id="themeToggle" class="theme-toggle ms-auto">Modo Oscuro</button>
    </div>
  </header>

  <main class="container">
    <div class="row">
      <!-- Formulario para Crear/Editar Usuario -->
      <div class="col-md-4 mb-4">
        <div class="card p-4">
          <h2 id="formTitle">Nuevo Usuario</h2>
          <form id="userForm">
            <input type="hidden" id="userId">
            <div class="form-group mb-3">
              <label for="userName" class="form-label">Nombre</label>
              <input type="text" id="userName" name="nombre" required class="form-control">
            </div>
            <div class="form-group mb-3">
              <label for="userEmail" class="form-label">Email</label>
              <input type="email" id="userEmail" name="email" required class="form-control">
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-100">Guardar Usuario</button>
            <button type="button" id="cancelBtn" class="btn btn-secondary w-100 mt-2 d-none">Cancelar</button>
          </form>
        </div>
      </div>

      <!-- Lista de Usuarios -->
      <div class="col-md-8">
        <div class="card p-4">
          <h2>Usuarios</h2>
          <div id="userList" class="row mt-3"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
