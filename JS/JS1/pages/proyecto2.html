<div class="row mb-4">
    <div class="col-12">
        <h1 class="mb-2"><i class="bi bi-box-seam me-2 text-success"></i> Proyecto 2 - Productos</h1>
        <p class="lead text-muted">Gestión de productos con CRUD, tabla, cards y búsquedas</p>
    </div>
</div>

<div class="row">
    <div class="col-lg-5 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Agregar Producto</h5>
            </div>
            <div class="card-body">
                <div id="alerts-proyecto2"></div>
                <form id="productForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" class="form-control" name="nombre" placeholder="Ingrese el nombre del producto">
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" name="categoria">
                                <option value="">Seleccione...</option>
                                <option value="Deportes">Deportes</option>
                                <option value="Tecnología">Tecnología</option>
                                <option value="Hogar">Hogar</option>
                                <option value="Moda">Moda</option>
                                <option value="Alimentos">Alimentos</option>
                            </select>
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Marca</label>
                            <input type="text" class="form-control" name="marca" placeholder="Marca">
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Precio</label>
                            <input type="number" class="form-control" name="precio" placeholder="0.00" step="0.01">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Stock</label>
                            <input type="number" class="form-control" name="stock" placeholder="0">
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" name="descripcion" rows="3" placeholder="Descripción del producto"></textarea>
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success" id="productFormSubmit">
                            <i class="bi bi-save me-2"></i>Agregar Producto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-7">
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-search me-2"></i>Buscador</h5>
            </div>
            <div class="card-body">
                <input type="text" class="form-control" id="searchProduct" placeholder="Buscar por nombre, categoría o marca...">
            </div>
        </div>
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-table me-2"></i>Tabla de Productos</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Marca</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Descripción</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-grid-3x2 me-2"></i>Cards de Productos</h5>
            </div>
            <div class="card-body">
                <div class="row" id="productsCards"></div>
            </div>
        </div>
    </div>
</div>
