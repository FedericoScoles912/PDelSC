<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3: Recorrido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; padding-top: 20px; }
        .lab-module { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #child-count { font-size: 2rem; font-weight: 800; color: #6366f1; }
    </style>
</head>
<body>
    <div class="container my-5">
        <a href="http://localhost:3000" class="btn btn-link text-decoration-none mb-4 p-0">← Dashboard</a>
        <div class="lab-module text-center">
            <h3 class="fw-bold mb-4">03. Recorrido del Árbol</h3>

            <!-- RESULT FIRST -->
            <div class="mb-4 p-4 bg-light rounded-3">
                <span class="d-block text-muted small text-uppercase fw-bold mb-1">Hijos Detectados</span>
                <span id="child-count">0</span>
            </div>

            <div id="traversal-container" class="p-4 border rounded mb-4 text-start">
                <p class="mb-2">Elemento P</p>
                <div class="badge bg-secondary mb-2">Badge Component</div>
                <ul class="mb-2"><li>Lista Item</li></ul>
                <span class="text-info">Inline Span</span>
            </div>

            <button id="btn-scan-children" class="btn btn-primary rounded-pill px-5 fw-bold">ESCANEAR AHORA</button>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
