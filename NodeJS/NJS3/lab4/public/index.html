<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4: Atributos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; padding-top: 20px; }
        .lab-module { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #dom-log { background: #1e293b; color: #38bdf8; padding: 1rem; border-radius: 12px; font-family: monospace; font-size: 0.8rem; margin-bottom: 2rem; max-height: 200px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <div class="container my-5">
        <a href="http://localhost:3000" class="btn btn-link text-decoration-none mb-4 p-0">← Dashboard</a>
        <div class="lab-module text-center">
            <h3 class="fw-bold mb-4">04. Atributos y Logging</h3>

            <!-- LOG FIRST -->
            <div id="dom-log">
                <ul id="log-list" class="list-unstyled mb-0">
                    <li>> Monitor de cambios activo...</li>
                </ul>
            </div>

            <div id="anchor-container" class="d-flex flex-wrap justify-content-center gap-2 mb-4">
                <a href="https://google.com" target="_blank" class="btn btn-outline-secondary btn-sm" id="main-link">Google Principal</a>
            </div>

            <!-- Botones de Control del Lab 4 -->
            <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
                <button id="btn-change-color" class="btn btn-primary rounded-pill px-4 btn-sm">Cambiar Color</button>
                <button id="btn-add-div" class="btn btn-primary rounded-pill px-4 btn-sm">Agregar Div</button>
                <button id="btn-add-btn" class="btn btn-primary rounded-pill px-4 btn-sm">Agregar Botón</button>
                <button id="btn-change-href" class="btn btn-primary rounded-pill px-4 btn-sm">Cambiar Href</button>
                <button id="btn-add-img" class="btn btn-primary rounded-pill px-4 btn-sm">Agregar Img</button>
            </div>

            <!-- Contenedor para elementos agregados dinámicamente -->
            <div id="dynamic-elements-container" class="mt-4 p-3 border rounded bg-light min-vh-25 d-flex flex-column align-items-center gap-3">
                <p class="text-muted small mb-0">Los elementos aparecerán aquí...</p>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
