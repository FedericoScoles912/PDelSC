<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2: Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container my-5">
        <a href="http://localhost:3000" class="btn btn-link text-decoration-none mb-4 p-0">← Dashboard</a>
        <div class="lab-module">
            <h3 class="fw-bold mb-4 text-dark text-center">02. Manejo de Eventos</h3>

            <!-- FEEDBACK FIRST -->
            <div id="event-feedback">
                <span class="text-muted">Esperando interacción...</span>
            </div>

            <div class="row g-4">
                <div class="col-md-4">
                    <div id="event-card" class="card h-100 border-0 shadow-sm bg-light">
                        <div class="card-body text-center py-4">
                            <h6 class="fw-bold mb-0">MOUSE OVER</h6>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div id="event-alert" class="alert alert-indigo h-100 mb-0 d-flex align-items-center justify-content-center fw-bold" style="background-color: #e0e7ff; color: #4338ca; border: none; cursor: pointer;">
                        DOUBLE CLIC
                    </div>
                </div>
                <div class="col-md-4">
                    <button id="event-btn" class="btn btn-dark w-100 h-100 fw-bold">RIGHT CLIC</button>
                </div>
                <div class="col-md-6">
                    <div id="event-badge" class="p-3 text-center bg-info text-white rounded-pill fw-bold" style="cursor: pointer;">
                        SIMPLE CLIC
                    </div>
                </div>
                <div class="col-md-6">
                    <ul id="event-list" class="list-group">
                        <li class="list-group-item text-center fw-bold bg-light border-0 py-3" style="cursor: pointer;">MOUSE OUT</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
