<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 6: Registro Moderno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container my-5">
        <a href="http://localhost:3000" class="btn btn-link text-decoration-none mb-4 p-0">← Dashboard</a>
        
        <div class="lab-module mx-auto" style="max-width: 800px;">
            <h3 class="fw-bold mb-4 text-center">06. Registro de Usuario</h3>

            <!-- PROFILE CARD (OUTPUT) FIRST -->
            <div id="profile-card-container" class="d-flex justify-content-center align-items-center">
                <p class="text-muted mb-0">Tu perfil se generará aquí...</p>
            </div>

            <hr class="my-4 opacity-10">

            <!-- FORM SECOND -->
            <form id="registration-form" class="row g-4">
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-uppercase">Nombre Completo</label>
                    <input type="text" class="form-control" id="inputName" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-uppercase">Email</label>
                    <input type="email" class="form-control" id="inputEmail" placeholder="juan@gmail.com" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase">Edad</label>
                    <input type="number" class="form-control" id="inputAge" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label small fw-bold text-uppercase">Módulo Favorito</label>
                    <select id="inputFavoriteModule" class="form-select" required>
                        <option value="" selected disabled>Seleccionar...</option>
                        <option value="1">Interacción Básica</option>
                        <option value="2">Eventos</option>
                        <option value="3">Recorrido DOM</option>
                        <option value="4">Atributos y Log</option>
                        <option value="5">InnerHTML</option>
                        <option value="6">Formulario</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label small fw-bold text-uppercase d-block">Género</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="gM" value="Hombre" checked>
                        <label class="form-check-label" for="gM">Hombre</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="gF" value="Mujer">
                        <label class="form-check-label" for="gF">Mujer</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="gO" value="Otro">
                        <label class="form-check-label" for="gO">Otro</label>
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="checkUpdates" required>
                        <label class="form-check-label small text-muted" for="checkUpdates">
                            Deseo recibir actualizaciones sobre futuros proyectos.
                        </label>
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success w-100 fw-bold">CREAR PERFIL</button>
                </div>
                <div id="form-errors" class="col-12"></div>
            </form>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
